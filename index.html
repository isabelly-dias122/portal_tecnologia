<!DOCTYPE html>
<!-- Define que estamos usando HTML5 -->

<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <!-- Permite acentuação (muito importante para PT-BR) -->

    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- Faz o site funcionar bem em celular -->

    <title>Guia CSS - Aula</title>

    <!-- BOA PRÁTICA ✅ -->
    <!-- Usar CSS externo -->
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <!-- ================= HEADER ================= -->
    <header class="topo">
        <h1>Brecho!</h1>
        <p class="subtitulo">Roupinhas com o melhro preço.</p>
    </header>

    <!-- ================= MENU ================= -->
   <nav class="menu">
    <a href="#">Início</a>
    <a href="#">Produtos</a>
    <a href="#">Contato</a>
</nav>

    <!-- ================= CONTEÚDO ================= -->
    <main class="container">

        <div class="card destaque">
        <h2>Calças</h2>
        <p>Calças em ótimo estado.</p>
        <div class="preco">R$ 89,90</div>
        <button>Comprar</button>
    </div>

        <!-- CARD 1 -->
        <div class="card">
        <h2>Blusas Femininas</h2>
        <p>Blusas femininas em ótimo estado.</p>
        <div class="preco">R$ 39,90</div>
        <button>Comprar</button>
    </div>

        <!-- CARD 2 -->
        <div class="card">
        <h2>Casacos.</h2>
        <p>Casacos em ótimo estado.</p>
        <div class="preco">R$ 99,90</div>
        <button>Comprar</button>
    </div>

        <!-- CARD 3 -->
       <div class="card">
        <h2>Casacos.</h2>
        <p>Blusas Masculinas em ótimo estado.</p>
        <div class="preco">R$ 39,90</div>
        <button>Comprar</button>
    </div>

    </main>

    <!-- ================= RODAPÉ ================= -->
    <footer class="rodape">
        <p>© 2026 - Aula de CSS</p>
    </footer>

</body>
</html>
